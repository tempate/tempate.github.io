<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} | Daniel Díaz Quílez</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <img class="sidebar-photo"
         src="/assets/images/me.jpg"
         alt="Daniel Díaz Quílez"
         onerror="this.style.display='none'" />
    <div class="sidebar-name">Daniel Díaz Quílez</div>
    <div class="sidebar-title">Master's student · Mathematics</div>

    <div class="sidebar-links">
      <a href="mailto:daniel.diaz@helsinki.fi">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/>
        </svg>
        daniel.diaz@helsinki.fi
      </a>
      <a href="https://github.com/tempate" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
        </svg>
        GitHub
      </a>
      <a href="https://scholar.google.com/citations?user=UsqQPVUAAAAJ&hl=en" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        Google Scholar
      </a>
    </div>

    <nav>
      <a href="/" class="{% if page.url == '/' %}active{% endif %}">Home</a>
      <a href="/pages/publications" class="{% if page.url contains 'publications' %}active{% endif %}">Publications</a>
      <a href="/pages/teaching"     class="{% if page.url contains 'teaching'     %}active{% endif %}">Teaching</a>
      <a href="/pages/software"     class="{% if page.url contains 'software'     %}active{% endif %}">Software</a>
    </nav>
  </aside>

  <div class="overlay" id="overlay"></div>
  <button class="burger" id="burger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>

  <main class="main">
    {{ content }}
    <div class="page-foot">Hosted on GitHub Pages</div>
  </main>

  <script>
    const burger  = document.getElementById('burger');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    burger.addEventListener('click', () => {
      const open = burger.classList.toggle('open');
      sidebar.classList.toggle('open', open);
      overlay.classList.toggle('open', open);
    });
    overlay.addEventListener('click', () => {
      burger.classList.remove('open');
      sidebar.classList.remove('open');
      overlay.classList.remove('open');
    });
  </script>
</body>
</html>
